name: Tests
on:
  pull_request:
    branches: [master, compose_migration]
  push:
    branches: [master, compose_migration]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: |
          echo "OPENWEATHER_KEY=" > secrets.properties
          echo "RAPIDAPI_KEY=" >> secrets.properties
          echo "MAPS_API_KEY=" >> secrets.properties
          echo "GOOGLE_WEB_CLIENT_ID=" >> secrets.properties
      - run: ./gradlew :shared:testDebugUnitTest --no-daemon
      - run: ./gradlew :shared:detekt --no-daemon
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: shared/build/reports/
