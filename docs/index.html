<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fishing Notes — Legal</title>
  <style>
    :root { --brand-top: #0B4F6C; --brand-bottom: #1B98E0; --ink: #14202b; --muted: #5b6b78; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--ink); background: #f5f8fa; }
    header { background: linear-gradient(160deg, var(--brand-top), var(--brand-bottom)); color: #fff; padding: 56px 24px; text-align: center; }
    header h1 { margin: 0 0 8px; font-size: 32px; }
    header p { margin: 0; opacity: 0.9; }
    main { max-width: 720px; margin: 0 auto; padding: 40px 24px 64px; }
    .card { display: block; background: #fff; border-radius: 16px; padding: 24px 28px; margin-bottom: 18px; text-decoration: none; color: inherit; box-shadow: 0 8px 24px rgba(11,79,108,0.08); border: 1px solid #e6edf1; transition: transform .12s ease, box-shadow .12s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(11,79,108,0.14); }
    .card h2 { margin: 0 0 6px; font-size: 20px; color: var(--brand-top); }
    .card p { margin: 0; color: var(--muted); }
    footer { text-align: center; color: var(--muted); font-size: 13px; padding: 0 24px 48px; }
    a { color: var(--brand-bottom); }
  </style>
</head>
<body>
  <header>
    <h1>Fishing Notes</h1>
    <p>Your fishing log, always with you.</p>
  </header>
  <main>
    <a class="card" href="./privacy.html">
      <h2>Privacy Policy &rarr;</h2>
      <p>What data Fishing Notes collects, why, and how to request deletion.</p>
    </a>
    <a class="card" href="./terms.html">
      <h2>Terms of Service &rarr;</h2>
      <p>The terms that apply when you use Fishing Notes.</p>
    </a>
  </main>
  <footer>
    <p>Questions? Email <a href="mailto:merkostdev+fishing@gmail.com">merkostdev+fishing@gmail.com</a></p>
  </footer>
</body>
</html>
